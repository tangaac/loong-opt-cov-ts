name: CI

on:
  issue_comment:
    types: created

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Check for permissions.
        id: check-member
        uses: bryantson/check-member-exists-in-team-actions@1.0
        with:
          team_slug: pr-subscribers-loongarch
          org_slug: llvm
          gh_token: ${{ secrets.OPT_COV_TOKEN }}
          username: ${{ github.actor }}

      - name: Print whether member exists
        run: |
          echo "Does member exists: ${{ steps.check-member.outputs.exists-in-team }}"
